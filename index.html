<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0f; color: #ffffff; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #12121a; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2a3a; }
        .logo { width: 40px; height: 40px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header-text h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #6c63ff, #3ecfcf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-text p { font-size: 12px; color: #666; }
        .status-dot { width: 8px; height: 8px; background: #3ecfcf; border-radius: 50%; margin-left: auto; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .welcome { text-align: center; padding: 40px 20px; color: #444; }
        .welcome h2 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome p { font-size: 14px; margin-bottom: 24px; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .suggestion { background: #12121a; border: 1px solid #2a2a3a; color: #888; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { border-color: #6c63ff; color: #6c63ff; }
        .message { display: flex; gap: 10px; max-width: 80%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.ai { align-self: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
        .message.user .bubble { background: linear-gradient(135deg, #6c63ff, #5a52e0); color: white; border-bottom-right-radius: 4px; }
        .message.ai .bubble { background: #12121a; border: 1px solid #2a2a3a; color: #ddd; border-bottom-left-radius: 4px; }
        .action-card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 16px; max-width: 450px; align-self: flex-start; }
        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .card-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .card-title { font-size: 14px; font-weight: 600; color: #fff; }
        .card-intent { font-size: 11px; color: #6c63ff; text-transform: uppercase; letter-spacing: 1px; }
        .card-summary { font-size: 13px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
        .card-draft { background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px; font-size: 12px; color: #ccc; margin-bottom: 12px; line-height: 1.6; white-space: pre-wrap; }
        .card-actions { display: flex; gap: 8px; }
        .btn-confirm { flex: 1; padding: 10px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
        .btn-cancel { padding: 10px 16px; background: transparent; border: 1px solid #2a2a3a; border-radius: 10px; color: #666; font-size: 13px; cursor: pointer; }
        .btn-cancel:hover { border-color: #ff4444; color: #ff4444; }
        .loading { display: flex; gap: 4px; padding: 12px 16px; background: #12121a; border: 1px solid #2a2a3a; border-radius: 18px; border-bottom-left-radius: 4px; align-self: flex-start; }
        .loading span { width: 8px; height: 8px; background: #6c63ff; border-radius: 50%; animation: bounce 1.2s infinite; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }
        .input-area { padding: 16px 24px; background: #12121a; border-top: 1px solid #2a2a3a; display: flex; gap: 12px; align-items: flex-end; }
        .input-box { flex: 1; background: #0a0a0f; border: 1px solid #2a2a3a; border-radius: 16px; padding: 12px 16px; color: #fff; font-size: 14px; resize: none; outline: none; }
        .input-box:focus { border-color: #6c63ff; }
        .input-box::placeholder { color: #444; }
        .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, #6c63ff, #3ecfcf); border: none; border-radius: 12px; cursor: pointer; font-size: 18px; color: white; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">⚡</div>
    <div class="header-text"><h1>Orion AI</h1><p>AI Execution System</p></div>
    <div class="status-dot"></div>
</div>
<div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
        <h2>Selamat datang di Orion AI ⚡</h2>
        <p>Ketik perintah apa saja, saya akan memahami dan mengeksekusinya</p>
        <div class="suggestions">
            <div class="suggestion" onclick="sendSuggestion(this)">📧 Balas email klien</div>
            <div class="suggestion" onclick="sendSuggestion(this)">💬 Buat jawaban WhatsApp</div>
            <div class="suggestion" onclick="sendSuggestion(this)">📅 Buat meeting besok</div>
            <div class="suggestion" onclick="sendSuggestion(this)">📝 Buat laporan hari ini</div>
        </div>
    </div>
</div>
<div class="input-area">
    <textarea class="input-box" id="inputBox" placeholder="Ketik perintah... (contoh: balas email dari klien)" rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
</div>
<script>
    const chatArea = document.getElementById('chatArea');
    const inputBox = document.getElementById('inputBox');

    function getCardIcon(intent) {
        if (!intent) return '⚡';
        if (intent.includes('email')) return '📧';
        if (intent.includes('whatsapp')) return '💬';
        if (intent.includes('meeting')) return '📅';
        if (intent.includes('laporan')) return '📝';
        return '⚡';
    }

    function addMessage(text, type) {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `<div class="bubble">${text}</div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addLoading() {
        const div = document.createElement('div');
        div.id = 'loading';
        div.className = 'loading';
        div.innerHTML = '<span></span><span></span><span></span>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeLoading() {
        const el = document.getElementById('loading');
        if (el) el.remove();
    }

    function addActionCard(data) {
        let parsed;
        try {
            const clean = data.response.replace(/```json|```/g, '').trim();
            parsed = JSON.parse(clean);
        } catch(e) {
            addMessage(data.response, 'ai');
            return;
        }

        const cardDataStr = JSON.stringify(parsed).replace(/"/g, '&quot;');
        const draftHTML = parsed.draft ? `<div class="card-draft">${parsed.draft}</div>` : '';

        const card = document.createElement('div');
        card.className = 'action-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="card-icon">${getCardIcon(parsed.intent)}</div>
                <div>
                    <div class="card-intent">${parsed.intent || 'aksi'}</div>
                    <div class="card-title">Konfirmasi Aksi</div>
                </div>
            </div>
            <div class="card-summary">${parsed.summary || parsed.action}</div>
            ${draftHTML}
            <div class="card-actions">
                <button class="btn-confirm" onclick="confirmAction(this, '${parsed.intent}', '${cardDataStr}')">✓ Jalankan</button>
                <button class="btn-cancel" onclick="cancelAction(this)">✕ Batal</button>
            </div>
        `;
        chatArea.appendChild(card);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function confirmAction(btn, intent, cardData) {
        const card = btn.parentElement.parentElement;
        card.querySelector('.card-summary').textContent = '⏳ Sedang memproses...';
        btn.parentElement.innerHTML = '<span style="color:#3ecfcf;font-size:13px">⏳ Memproses...</span>';

        if (intent === 'balas_email' && cardData) {
            try {
                const data = JSON.parse(cardData.replace(/&quot;/g, '"'));
                if (data.reply_to && data.draft) {
                    const res = await fetch('http://127.0.0.1:8000/chat/send-email', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ to: data.reply_to, subject: data.subject || 'Re: ', body: data.draft })
                    });
                    card.querySelector('.card-summary').textContent = '✅ Email berhasil dikirim!';
                    btn.parentElement.innerHTML = '<span style="color:#3ecfcf;font-size:13px">✓ Terkirim!</span>';
                    return;
                }
            } catch(e) { console.log(e); }
        }

        card.querySelector('.card-summary').textContent = '✅ Aksi sedang dijalankan...';
        btn.parentElement.innerHTML = '<span style="color:#3ecfcf;font-size:13px">✓ Dikonfirmasi</span>';
    }

    function cancelAction(btn) {
        btn.parentElement.parentElement.querySelector('.card-summary').textContent = '❌ Aksi dibatalkan';
        btn.parentElement.innerHTML = '<span style="color:#ff4444;font-size:13px">✕ Dibatalkan</span>';
    }

    async function sendMessage() {
        const text = inputBox.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        inputBox.value = '';
        addLoading();
        try {
            const res = await fetch('http://127.0.0.1:8000/chat/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            removeLoading();
            addActionCard(data);
        } catch(e) {
            removeLoading();
            addMessage('❌ Gagal terhubung ke server.', 'ai');
        }
    }

    function sendSuggestion(el) {
        inputBox.value = el.textContent.replace(/^[^\w]+/, '').trim();
        sendMessage();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
</script>
</body>
</html>
